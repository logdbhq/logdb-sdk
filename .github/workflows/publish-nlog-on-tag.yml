name: Publish LogDB.NLog to NuGet.org

on:
  push:
    tags:
      - "nlog-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "LogDB.NLog package version (e.g. 5.0.18 or 5.0.18-beta.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore LogDB.SDK.slnx

      - name: Test
        run: dotnet test LogDB.SDK.slnx --configuration Release --no-restore --verbosity minimal

  publish:
    needs: test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate NuGet.org secret
        shell: bash
        run: |
          if [[ -z "${{ secrets.NUGET_API_KEY }}" ]]; then
            echo "::error::Missing NUGET_API_KEY secret."
            exit 1
          fi

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#nlog-v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::Unable to resolve package version."
            exit 1
          fi

          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $VERSION"

      - name: Restore
        run: dotnet restore LogDB.SDK.slnx

      - name: Pack LogDB.NLog
        run: dotnet pack LogDB.NLog/com.logdb.nlog.csproj --configuration Release --no-restore --output ./artifacts/nuget -p:PackageVersion=${{ steps.version.outputs.package_version }} -p:ContinuousIntegrationBuild=true

      - name: Push package to NuGet.org
        shell: bash
        run: |
          dotnet nuget push "./artifacts/nuget/LogDB.NLog*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
          dotnet nuget push "./artifacts/nuget/LogDB.NLog*.snupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
