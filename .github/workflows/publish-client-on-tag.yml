name: Publish LogDB.Client

on:
  push:
    tags:
      - "client-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "LogDB.Client package version (e.g. 5.0.2 or 5.0.2-beta.1)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore LogDB.SDK.slnx

      - name: Test
        run: dotnet test LogDB.SDK.slnx --configuration Release --no-restore --verbosity minimal

  publish:
    needs: test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate NUGET secrets
        shell: bash
        run: |
          if [[ -z "${{ secrets.NUGET_PAT }}" ]]; then
            echo "::error::Missing NUGET_PAT secret."
            exit 1
          fi
          if [[ -z "${{ secrets.NUGET_USERNAME }}" ]]; then
            echo "::error::Missing NUGET_USERNAME secret (GitHub username that owns NUGET_PAT)."
            exit 1
          fi

      - name: Configure GitHub Packages NuGet source
        shell: bash
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ secrets.NUGET_USERNAME }}" \
            --password "${{ secrets.NUGET_PAT }}" \
            --store-password-in-clear-text

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#client-v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::Unable to resolve package version."
            exit 1
          fi

          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $VERSION"

      - name: Restore
        run: dotnet restore LogDB.SDK.slnx

      - name: Pack LogDB.Client
        run: dotnet pack LogDB.Client/com.logdb.logger.csproj --configuration Release --no-restore --output ./artifacts/nuget -p:PackageVersion=${{ steps.version.outputs.package_version }} -p:ContinuousIntegrationBuild=true

      - name: Push package to GitHub Packages
        shell: bash
        run: |
          dotnet nuget push "./artifacts/nuget/LogDB.Client*.nupkg" \
            --source "github" \
            --api-key "${{ secrets.NUGET_PAT }}" \
            --skip-duplicate
